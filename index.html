<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>弹力砖块消除游戏</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☄️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
        }

        #game-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            max-height: 100%;
            margin: 0 !important;
            padding: 0 !important;
        }

        #game-wrapper canvas {
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain;
            border: 3px solid #4a4a6e;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        /* 响应式边框 - 小屏幕上更细 */
        @media (max-width: 768px) {
            #game-wrapper canvas {
                border-width: 2px;
                border-radius: 6px;
            }

            #game-container {
                padding: 5px;
            }
        }

        @media (max-width: 480px) {
            #game-wrapper canvas {
                border-width: 1px;
                border-radius: 4px;
            }
        }
    </style>
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "jxmn1qjx88");
    </script>
</head>

<body>
    <div id="game-container">
        <div id="game-wrapper"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script async src="https://hm.baidu.com/hm.js?b3f6e7ec9302021671173e3fad14f4cd"></script>
</body>

</html>
