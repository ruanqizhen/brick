<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>弹力砖块消除游戏</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☄️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a12;
            --primary: #00d4ff;
            --primary-dim: rgba(0, 212, 255, 0.15);
            --accent: #ff3366;
            --accent-dim: rgba(255, 51, 102, 0.15);
            --gold: #ffcc00;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Orbitron', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            touch-action: none;
            color: white;
            font-family: var(--font-body);
        }

        /* ─── Ambient Background Glow ─── */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 600px 400px at 30% 20%, rgba(0, 212, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 500px 500px at 70% 80%, rgba(255, 51, 102, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 300px 300px at 50% 50%, rgba(255, 204, 0, 0.03) 0%, transparent 60%);
            animation: ambient-pulse 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes ambient-pulse {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 仅在屏幕极高(窄)时，让游戏区域靠近上方 */
        @media (max-aspect-ratio: 2/3) {
            #game-container {
                align-items: flex-start !important;
            }

            #game-wrapper canvas {
                align-self: flex-start !important;
                margin: 5vh auto 0 auto !important;
            }
        }

        #game-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            max-height: 100%;
            margin: 0 !important;
            padding: 0 !important;
        }

        #game-wrapper canvas {
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain;
            border: 2px solid var(--primary);
            box-shadow:
                0 0 60px rgba(0, 212, 255, 0.2),
                0 0 120px rgba(0, 212, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(0, 212, 255, 0.5);
            /* 去除圆角以更符合 Phaser 直接绘图感，或者保留一点点 */
            border-radius: 4px;
        }

        /* 响应式边框 - 小屏幕上更细 */
        @media (max-width: 768px) {
            #game-wrapper canvas {
                border-width: 2px;
                border-radius: 6px;
            }

            #game-container {
                padding: 5px;
            }
        }

        @media (max-width: 480px) {
            #game-wrapper canvas {
                border-width: 1px;
                border-radius: 4px;
            }
        }
    </style>
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "jxmn1qjx88");
    </script>
</head>

<body>
    <div class="ambient-glow"></div>
    <div id="game-container">
        <div id="game-wrapper"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script async src="https://hm.baidu.com/hm.js?b3f6e7ec9302021671173e3fad14f4cd"></script>
</body>

</html>
