<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>弹力砖块消除游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            max-height: 100%;
        }

        #game-wrapper canvas {
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain;
            border: 3px solid #4a4a6e;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        /* 响应式边框 - 小屏幕上更细 */
        @media (max-width: 768px) {
            #game-wrapper canvas {
                border-width: 2px;
                border-radius: 6px;
            }

            #game-container {
                padding: 5px;
            }
        }

        @media (max-width: 480px) {
            #game-wrapper canvas {
                border-width: 1px;
                border-radius: 4px;
            }
        }
    </style>
</head>

<body>
    <div id="game-container">
        <div id="game-wrapper"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
